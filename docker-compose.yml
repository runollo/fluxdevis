services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fluxdevis
      POSTGRES_PASSWORD: fluxdevis
      POSTGRES_DB: fluxdevis
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://fluxdevis:fluxdevis@db:5432/fluxdevis
      DATABASE_URL_SYNC: postgresql://fluxdevis:fluxdevis@db:5432/fluxdevis
    depends_on:
      - db
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
